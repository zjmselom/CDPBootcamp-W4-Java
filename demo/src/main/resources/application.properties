# Docker Setup Demo and Database Connection
# Spring Application Configuration

# Application Name
spring.application.name=docker-demo

# Database Configuration
spring.datasource.url=jdbc:mysql://db:3306/demo_db
spring.datasource.username=root
spring.datasource.password=root_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
# DEBUG level for Hibernate SQL statements
logging.level.org.hibernate.SQL=DEBUG

# TRACE level to show parameter bindings in SQL queries
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Server Configuration
server.port=8080